<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>神スケールトレーナー</title>
  <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png">
  <meta name="theme-color" content="#1e1e2e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style id="print-orient"></style>
  <style id="print-layout"></style>
</head>
<body>

<header class="header">
  <div class="brand">
    <img class="app-logo" src="%BASE_URL%icon-192.png" alt="神スケールトレーナー" draggable="false">
    <span class="brand-name">神スケールトレーナー</span>
  </div>
  <div class="editor-mode-banner new-mode" id="editorModeBanner">
    <span id="editorModeLabel"><span class="editor-mode-label-icon">✨</span>新規登録</span>
    <button class="editor-mode-cancel hidden" id="editorModeCancel" title="編集をキャンセル">✕ キャンセル</button>
  </div>
  <div class="header-spacer"></div>
  <span class="build-ver" id="buildVer"></span>

  <div class="layout-picker" id="layoutPicker">
    <button class="layout-trigger" id="layoutTrigger">
      <span class="layout-trigger-icon" id="layoutTriggerIcon"></span>
      <span class="layout-trigger-label" id="layoutTriggerLabel">2×3</span>
      <svg class="layout-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="2,3.5 5,6.5 8,3.5"/></svg>
    </button>
    <div class="layout-menu" id="layoutMenu">
      <div class="layout-menu-label">印刷レイアウト</div>
      <div class="layout-menu-grid" id="layoutMenuGrid"></div>
    </div>
  </div>

  <button class="btn-color" id="colorBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 0 18 2.5 2.5 0 0 0 0-5 .5.5 0 0 1 0-1h.01A9 9 0 0 0 12 3zM3 12a9 9 0 0 1 9-9 9 9 0 1 1-9 9zm5-1a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm4 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
    色
  </button>

  <button class="btn-print" id="printBtn">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5 1a1 1 0 0 0-1 1v1H3a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h1v1a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1h1a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-1V2a1 1 0 0 0-1-1H5zm0 2h6v1H5V3zm6 8H5v-2h6v2z"/></svg>
    印刷
  </button>

  <button class="btn-reset" id="resetBtn" title="保存データをすべて消去してリセット" aria-label="リセット">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
  </button>

  <button class="more-trigger" id="moreTrigger" aria-label="メニュー" aria-haspopup="true" aria-expanded="false">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <circle cx="8" cy="3" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="8" cy="13" r="1.5"/>
    </svg>
  </button>
  <div class="more-menu" id="moreMenu" role="menu">
    <button class="more-item" data-act="color" role="menuitem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 0 18 2.5 2.5 0 0 0 0-5 .5.5 0 0 1 0-1h.01A9 9 0 0 0 12 3zM3 12a9 9 0 0 1 9-9 9 9 0 1 1-9 9zm5-1a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm4 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
      色設定
    </button>
    <button class="more-item more-item-danger" data-act="reset" role="menuitem">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
      保存データをリセット
    </button>
  </div>
</header>

<!-- ── タブナビゲーション ──────────────────────────────────────────── -->
<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="editor">スケールエディター</button>
  <button class="tab-btn" data-tab="saved">
    登録スケール
    <span class="tab-badge" id="savedBadge" style="display:none">0</span>
  </button>
</div>

<!-- ── 1画面レイアウト ──────────────────────────────────────────────── -->
<div class="app-body">

<!-- ── エディターパネル ────────────────────────────────────────────── -->
<div class="tab-panel" id="panelEditor">

  <!-- ── スケールエディター ──────────────────────────────────────────── -->
  <div class="editor">

    <!-- コンパクトサイドバー: キー + スケール/コード -->
    <aside class="editor-sidebar">

      <!-- 楽器選択 -->
      <div class="ctrl-group">
        <div class="ctrl-label">楽器</div>
        <button class="instr-btn" id="instrumentBtn"></button>
      </div>

      <!-- キー -->
      <div class="ctrl-group">
        <div class="ctrl-label">キー</div>
        <button class="key-picker-btn" id="keyPickerBtn">A ▾</button>
      </div>

      <!-- スケール / コード -->
      <div class="ctrl-group">
        <div class="ctrl-label">スケール / コード</div>
        <button class="scale-picker-btn" id="scalePickerBtn">
          <span class="scale-picker-btn-text" id="scalePickerBtnText">スケール選択 ▾</span>
        </button>
      </div>


    </aside>

    <!-- 指板エリア -->
    <div class="editor-fretboard">

      <!-- スケール名 (編集可能) + 登録ボタン -->
      <div class="fb-header">
        <button class="btn-register" id="registerBtn">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L10.5 0H2zM10 1.5V5h3.5L10 1.5z"/><path d="M8.5 11.5v-3h1v3h-1zm0 1.5h1v1h-1v-1z" fill="#fff"/></svg>
          <span id="registerBtnLabel">登録</span>
        </button>
        <input class="fb-title-input" id="fbTitleInput" placeholder="スケール名を入力..." autocomplete="off" spellcheck="false">
      </div>

      <!-- 指板 -->
      <div class="fb-wrap" id="editFbWrap">
        <svg class="fb" id="fretboard" viewBox="0 0 960 230" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <!-- 度数行: [度数ボタン] + [度数チップ] -->
      <div class="deg-display-row">
        <button class="deg-picker-btn" id="degPickerBtn">スケール設定  設定数：0</button>
        <div class="legend" id="legend"></div>
      </div>

      <!-- フレット範囲 -->
      <div class="mask-section">
        <div class="ctrl-label">フレット範囲</div>
        <div class="mask-row" id="maskControl"></div>
      </div>

      <!-- iReal Pro (一旦無効化) -->
      <div class="ireal-section hidden" id="irealSection">
        <div class="ireal-section-header">
          <span class="ctrl-label" style="margin-bottom:0">iReal Pro</span>
          <button class="ireal-file-btn" id="irealFileBtn" title="iReal Proファイルを読み込む">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z"/></svg>
            ファイルを開く
          </button>
        </div>
        <div class="ireal-chip-strip" id="irealChordGrid"></div>
        <button class="ireal-register-all-btn hidden" id="irealRegisterAll">
          全コードを一括登録
        </button>
      </div>

    </div><!-- /editor-fretboard -->
  </div><!-- /editor -->

  <footer class="editor-footer">
    <a class="author-link" href="https://x.com/FXsimone" target="_blank" rel="noopener noreferrer">
      <svg class="author-link-icon" viewBox="0 0 24 24" aria-label="X (Twitter)" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="5" fill="#000"/>
        <path d="M13.956 10.735L18.86 5h-1.16l-4.26 4.95L9.974 5H6l5.14 7.481L6 19.5h1.16l4.496-5.226 3.59 5.226H19l-5.044-8.765zm-1.592 1.85-.52-.746L7.52 5.9h1.78l3.341 4.779.52.746 4.34 6.207h-1.78l-3.357-4.802-.96.755z" fill="#fff"/>
      </svg>
      作者：シモーネ
    </a>
  </footer>

</div><!-- /panelEditor -->

<!-- ── 登録スケールパネル ─────────────────────────────────────────── -->
<div class="tab-panel hidden" id="panelSaved">
  <section class="saved-section" id="savedSection">
    <div class="saved-section-hdr" id="savedSectionHdr" style="display:none">
      <span class="saved-section-title">登録スケール一覧</span>
      <button class="btn-delete" id="deleteAllBtn">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
          <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
          <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2h3.5V1h3v1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/>
        </svg>
        全削除
      </button>
    </div>
    <div class="saved-empty" id="savedEmpty">
      <div class="saved-empty-icon">📋</div>
      <div class="saved-empty-title">登録済みのスケールはありません</div>
      <div class="saved-empty-hint">スケール名を入力して「登録」を押すとここに表示されます</div>
    </div>
    <div id="savedGrid"></div>
    <div class="saved-warn-restore hidden" id="savedWarnRestore">
      <button class="btn-warn-restore" id="savedWarnRestoreBtn">🔔 削除時の警告を有効にする</button>
    </div>
  </section>
</div><!-- /panelSaved -->

</div><!-- /app-body -->

<!-- ── 削除確認ダイアログ ──────────────────────────────────────────── -->
<div class="modal-overlay" id="deleteConfirmModal">
  <div class="modal-box">
    <div class="modal-title">削除の確認</div>
    <div class="modal-body" id="deleteConfirmMsg"></div>
    <label class="delete-warn-check-label">
      <input type="checkbox" id="deleteWarnDontShow"> 今後この警告を表示しない
    </label>
    <div class="modal-actions">
      <button class="modal-cancel" id="deleteConfirmCancel">キャンセル</button>
      <button class="modal-confirm modal-confirm-danger" id="deleteConfirmOk">削除</button>
    </div>
  </div>
</div>

<!-- ── キー選択モーダル ────────────────────────────────────────────── -->
<div class="modal-overlay" id="keyPickerModal">
  <div class="instr-modal-box picker-modal-large">
    <div class="picker-modal-header">
      <span class="picker-modal-title">キーを選択</span>
      <button class="scale-modal-close" id="keyPickerClose">✕</button>
    </div>
    <div class="deg-grid" id="keyPickerList"></div>
  </div>
</div>

<!-- ── 度数選択モーダル ────────────────────────────────────────────── -->
<div class="modal-overlay" id="degPickerModal">
  <div class="instr-modal-box picker-modal-large">
    <div class="picker-modal-header">
      <span class="picker-modal-title">スケール設定</span>
      <button class="scale-modal-close" id="degPickerClose">✕</button>
    </div>
    <div class="deg-grid" id="degPickerPiano"></div>
    <button class="picker-done-btn" id="degPickerDone">完了</button>
  </div>
</div>

<!-- ── 印刷ダイアログ ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="printModal">
  <div class="modal-box">
    <div class="modal-title">印刷設定</div>
    <div class="modal-label">向き</div>
    <div class="print-orient-row" id="printOrientRow">
      <button class="print-orient-btn active" data-orient="landscape">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x=".75" y=".75" width="16.5" height="12.5" rx="1.5"/></svg>
        横
      </button>
      <button class="print-orient-btn" data-orient="portrait">
        <svg width="14" height="18" viewBox="0 0 14 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x=".75" y=".75" width="12.5" height="16.5" rx="1.5"/></svg>
        縦
      </button>
    </div>
    <div class="modal-label">レイアウト</div>
    <div class="layout-menu-grid" id="printLayoutGrid" style="max-width:240px;margin-bottom:4px"></div>
    <div class="modal-actions">
      <button class="modal-cancel" data-act="cancel">キャンセル</button>
      <button class="modal-confirm" data-act="print">印刷</button>
    </div>
  </div>
</div>

<!-- ── 色設定モーダル ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="colorModal">
  <div class="color-modal-box">
    <div class="color-modal-header">
      <div class="modal-title">度数カラー設定</div>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn-reset-colors" data-act="reset">デフォルトに戻す</button>
        <button class="modal-confirm" data-act="close">閉じる</button>
      </div>
    </div>
    <div class="color-list" id="colorList"></div>
  </div>
</div>

<!-- ── 楽器選択モーダル ────────────────────────────────────────────── -->
<div class="modal-overlay" id="instrumentModal">
  <div class="instr-modal-box">
    <div class="modal-title">楽器を選択</div>
    <div class="instr-choice-row">
      <button class="instr-choice-btn" data-instrument="guitar">
        <div class="instr-choice-icon">
          <img src="%BASE_URL%guitar_icon.jpg" alt="Guitar" draggable="false">
        </div>
        <div class="instr-choice-label">Guitar</div>
        <div class="instr-choice-sub">6 strings</div>
      </button>
      <button class="instr-choice-btn" data-instrument="bass">
        <div class="instr-choice-icon">
          <img src="%BASE_URL%bass_icon.jpg" alt="Bass" draggable="false">
        </div>
        <div class="instr-choice-label">Bass</div>
        <div class="instr-choice-sub">4 strings</div>
      </button>
    </div>
  </div>
</div>

<!-- ── 全画面フレットボード ────────────────────────────────────────── -->
<div class="fb-fullscreen hidden" id="fbFullscreen">
  <div class="fb-fullscreen-inner" id="fbFullscreenInner">
    <div class="fb-fullscreen-hdr">
      <div class="fb-fullscreen-title" id="fbFullscreenTitle"></div>
      <button class="fb-fullscreen-close" id="fbFullscreenClose" aria-label="閉じる">&#x2715;</button>
    </div>
    <div class="fb-wrap">
      <svg class="fb" id="fbFullscreenSvg" viewBox="0 0 960 230" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="legend" id="fbFullscreenLegend"></div>
  </div>
</div>

<!-- ── スケール / コード選択モーダル ──────────────────────────────── -->
<div class="modal-overlay" id="scalePickerModal">
  <div class="instr-modal-box scale-modal-wide">
    <div class="picker-modal-header">
      <span class="picker-modal-title">スケール / コードを選択</span>
      <button class="scale-modal-close" id="scalePickerClose">✕</button>
    </div>
    <div class="scale-cat-grid" id="scaleCatList"></div>
    <div class="scale-name-list" id="scaleNameList"></div>
  </div>
</div>


<script type="module" src="/src/main.js"></script>
</body>
</html>
