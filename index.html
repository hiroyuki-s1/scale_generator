<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>スケールジェネレータ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style id="print-orient"></style>
  <style id="print-layout"></style>
</head>
<body>

<header class="header">
  <div class="brand">
    <span class="brand-badge">SG</span>
    <span class="brand-name">スケールジェネレータ</span>
  </div>
  <div class="header-spacer"></div>
  <span class="build-ver" id="buildVer"></span>

  <div class="layout-picker" id="layoutPicker">
    <button class="layout-trigger" id="layoutTrigger">
      <span class="layout-trigger-icon" id="layoutTriggerIcon"></span>
      <span class="layout-trigger-label" id="layoutTriggerLabel">2×3</span>
      <svg class="layout-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="2,3.5 5,6.5 8,3.5"/></svg>
    </button>
    <div class="layout-menu" id="layoutMenu">
      <div class="layout-menu-label">印刷レイアウト</div>
      <div class="layout-menu-grid" id="layoutMenuGrid"></div>
    </div>
  </div>

  <button class="btn-color" id="colorBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 0 18 2.5 2.5 0 0 0 0-5 .5.5 0 0 1 0-1h.01A9 9 0 0 0 12 3zM3 12a9 9 0 0 1 9-9 9 9 0 1 1-9 9zm5-1a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm4 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
    色
  </button>

  <button class="btn-print" id="printBtn">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5 1a1 1 0 0 0-1 1v1H3a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h1v1a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1h1a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-1V2a1 1 0 0 0-1-1H5zm0 2h6v1H5V3zm6 8H5v-2h6v2z"/></svg>
    印刷
  </button>

  <button class="btn-reset" id="resetBtn" title="保存データをすべて消去してリセット" aria-label="リセット">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
  </button>

  <button class="more-trigger" id="moreTrigger" aria-label="メニュー" aria-haspopup="true" aria-expanded="false">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
      <circle cx="8" cy="3" r="1.5"/><circle cx="8" cy="8" r="1.5"/><circle cx="8" cy="13" r="1.5"/>
    </svg>
  </button>
  <div class="more-menu" id="moreMenu" role="menu">
    <button class="more-item" data-act="color" role="menuitem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 0 18 2.5 2.5 0 0 0 0-5 .5.5 0 0 1 0-1h.01A9 9 0 0 0 12 3zM3 12a9 9 0 0 1 9-9 9 9 0 1 1-9 9zm5-1a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm4 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
      色設定
    </button>
    <button class="more-item more-item-danger" data-act="reset" role="menuitem">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
      保存データをリセット
    </button>
  </div>
</header>

<!-- ── タブナビゲーション ──────────────────────────────────────────── -->
<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-tab="editor">エディター</button>
  <button class="tab-btn" data-tab="saved">
    登録スケール
    <span class="tab-badge" id="savedBadge" style="display:none">0</span>
  </button>
</div>

<!-- ── 1画面レイアウト ──────────────────────────────────────────────── -->
<div class="app-body">

<!-- ── エディターパネル ────────────────────────────────────────────── -->
<div class="tab-panel" id="panelEditor">

  <!-- ── スケールエディター ──────────────────────────────────────────── -->
  <div class="editor">

    <!-- コンパクトサイドバー: キー + スケール/コード -->
    <aside class="editor-sidebar">

      <!-- キー -->
      <div class="ctrl-group">
        <div class="ctrl-label">キー</div>
        <button class="key-picker-btn" id="keyPickerBtn">A ▾</button>
      </div>

      <!-- スケール / コード -->
      <div class="ctrl-group">
        <div class="ctrl-label">スケール / コード</div>
        <select class="scale-cat-sel" id="scaleCatSel"></select>
        <select class="scale-name-sel" id="scaleNameSel"></select>
      </div>

      <!-- 反映ボタン: desktop=スケール下, mobile=キー下 -->
      <button class="scale-apply-btn" id="scaleApplyBtn">反映</button>

    </aside>

    <!-- 指板エリア -->
    <div class="editor-fretboard">

      <!-- スケール名 (編集可能) + 登録ボタン -->
      <div class="fb-header">
        <button class="btn-register" id="registerBtn">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L10.5 0H2zM10 1.5V5h3.5L10 1.5z"/><path d="M8.5 11.5v-3h1v3h-1zm0 1.5h1v1h-1v-1z" fill="#fff"/></svg>
          登録
        </button>
        <input class="fb-title-input" id="fbTitleInput" placeholder="スケール名を入力..." autocomplete="off" spellcheck="false">
      </div>

      <!-- 指板 -->
      <div class="fb-wrap" id="editFbWrap">
        <svg class="fb" id="fretboard" viewBox="0 0 960 230" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <!-- 度数行: [度数ボタン] + [度数チップ] -->
      <div class="deg-display-row">
        <button class="deg-picker-btn" id="degPickerBtn">度数 ▾</button>
        <div class="legend" id="legend"></div>
      </div>

      <!-- フレット範囲 (旧Mask) -->
      <div class="mask-section">
        <div class="ctrl-label">フレット範囲</div>
        <div class="mask-row" id="maskControl"></div>
      </div>

      <!-- iReal Pro -->
      <div class="ireal-section" id="irealSection">
        <div class="ireal-section-header">
          <span class="ctrl-label">iReal Pro</span>
          <div class="ireal-input-row">
            <button class="ireal-file-btn" id="irealFileBtn">&#128190;</button>
            <input class="ireal-url-input" id="irealInput" type="text"
                   placeholder=".irealb / URL を貼り付け...">
            <button class="ireal-parse-btn" id="irealParseBtn">読込</button>
          </div>
        </div>
        <div class="ireal-song-header hidden" id="irealSongName"></div>
        <div class="ireal-chip-strip" id="irealChordGrid"></div>
      </div>

    </div><!-- /editor-fretboard -->
  </div><!-- /editor -->

  <!-- ── 登録スケール名一覧（コンパクト） ──────────────────────────── -->
  <div class="name-list-bar" id="nameListBar">
    <div class="name-chips" id="nameChips"></div>
  </div>

</div><!-- /panelEditor -->

<!-- ── 登録スケールパネル ─────────────────────────────────────────── -->
<div class="tab-panel hidden" id="panelSaved">
  <section class="saved-section" id="savedSection">
    <div class="saved-empty" id="savedEmpty">
      <div class="saved-empty-icon">📋</div>
      <div class="saved-empty-title">登録済みのスケールはありません</div>
      <div class="saved-empty-hint">スケール名を入力して「登録」を押すとここに表示されます</div>
    </div>
    <div id="savedGrid"></div>
  </section>
</div><!-- /panelSaved -->

</div><!-- /app-body -->

<!-- ── キー選択ポップアップ ────────────────────────────────────────── -->
<div class="picker-popup hidden" id="keyPickerPopup">
  <div class="picker-popup-label">キーを選択</div>
  <div class="note-grid" id="keyPickerPiano"></div>
</div>

<!-- ── 度数選択ポップアップ ────────────────────────────────────────── -->
<div class="picker-popup hidden" id="degPickerPopup">
  <div class="picker-popup-label">度数を選択</div>
  <div class="note-grid" id="degPickerPiano"></div>
  <div class="picker-popup-footer">
    <button class="picker-done-btn" id="degPickerDone">完了</button>
  </div>
</div>

<!-- ── 印刷ダイアログ ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="printModal">
  <div class="modal-box">
    <div class="modal-title">印刷設定</div>
    <div class="modal-label">向き</div>
    <div class="print-orient-row" id="printOrientRow">
      <button class="print-orient-btn active" data-orient="landscape">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x=".75" y=".75" width="16.5" height="12.5" rx="1.5"/></svg>
        横
      </button>
      <button class="print-orient-btn" data-orient="portrait">
        <svg width="14" height="18" viewBox="0 0 14 18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x=".75" y=".75" width="12.5" height="16.5" rx="1.5"/></svg>
        縦
      </button>
    </div>
    <div class="modal-label">レイアウト</div>
    <div class="layout-menu-grid" id="printLayoutGrid" style="max-width:240px;margin-bottom:4px"></div>
    <div class="modal-actions">
      <button class="modal-cancel" data-act="cancel">キャンセル</button>
      <button class="modal-confirm" data-act="print">印刷</button>
    </div>
  </div>
</div>

<!-- ── 色設定モーダル ──────────────────────────────────────────────── -->
<div class="modal-overlay" id="colorModal">
  <div class="color-modal-box">
    <div class="modal-title">度数カラー設定</div>
    <div class="color-list" id="colorList"></div>
    <div class="modal-actions">
      <button class="btn-reset-colors" data-act="reset">デフォルトに戻す</button>
      <button class="modal-confirm" data-act="close">閉じる</button>
    </div>
  </div>
</div>

<!-- ── 全画面フレットボード ────────────────────────────────────────── -->
<div class="fb-fullscreen hidden" id="fbFullscreen">
  <div class="fb-fullscreen-inner" id="fbFullscreenInner">
    <div class="fb-fullscreen-hdr">
      <div class="fb-fullscreen-title" id="fbFullscreenTitle"></div>
      <button class="fb-fullscreen-close" id="fbFullscreenClose" aria-label="閉じる">&#x2715;</button>
    </div>
    <div class="fb-wrap">
      <svg class="fb" id="fbFullscreenSvg" viewBox="0 0 960 230" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="legend" id="fbFullscreenLegend"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
