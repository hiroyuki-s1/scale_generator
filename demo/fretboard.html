<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スケールジェネレータ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Dynamically updated by JS: orientation + grid layout -->
  <style id="print-orient">@media print { @page { size: A4 landscape; margin: 10mm 12mm; } }</style>
  <style id="print-layout"></style>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #c0511f;
      --accent-dim:  #fff3ee;
      --bg:          #f7f5f1;
      --surface:     #ffffff;
      --surface-2:   #faf9f7;
      --border:      #e8e3da;
      --border-2:    #f0ece5;
      --text:        #18170f;
      --text-2:      #6b6560;
      --text-3:      #b0a9a1;
      --green:       #16a34a;
      --purple:      #5b21b6;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:   0 8px 24px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
      --radius:      10px;
    }

    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════════════════
       HEADER
    ══════════════════════════════════ */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 14px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: nowrap;
      overflow: visible;
    }

    .brand { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .brand-badge {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      color: var(--accent); background: var(--accent-dim);
      border: 1.5px solid #f0c4ac;
      padding: 3px 7px; border-radius: 6px; line-height: 1;
    }
    .brand-name { font-size: 13px; font-weight: 600; color: var(--text-2); flex-shrink: 0; }
    @media (max-width: 560px) { .brand-name { display: none; } }

    .header-spacer { flex: 1; min-width: 8px; }

    /* Compact segmented controls in header */
    .hdr-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hdr-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 9px;
      border: none; background: var(--surface);
      color: var(--text-3); font-size: 11px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: all .12s; white-space: nowrap;
    }
    .hdr-btn + .hdr-btn { border-left: 1px solid var(--border); }
    .hdr-btn:hover { background: var(--bg); color: var(--text-2); }
    .hdr-btn.active { background: var(--text); color: #fff; }

    /* Layout dropdown picker */
    .layout-picker {
      position: relative;
      flex-shrink: 0;
    }
    .layout-trigger {
      display: flex; align-items: center; gap: 6px;
      padding: 0 10px; height: 32px;
      border: 1px solid var(--border); border-radius: 7px;
      background: var(--surface); color: var(--text-2);
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .12s; white-space: nowrap;
    }
    .layout-trigger:hover { background: var(--bg); border-color: #c8bfb5; }
    .layout-trigger.open { border-color: var(--accent); }
    .layout-trigger-icon { color: var(--text-3); display: flex; }
    .layout-trigger-label { color: var(--text-2); }
    .layout-chevron {
      color: var(--text-3); transition: transform .18s ease;
    }
    .layout-trigger.open .layout-chevron { transform: rotate(180deg); }

    .layout-menu {
      position: absolute; top: calc(100% + 6px); right: 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; box-shadow: var(--shadow-md);
      padding: 8px; z-index: 9999;
      display: none; flex-direction: column; gap: 4px;
      min-width: 180px;
    }
    .layout-menu.open { display: flex; animation: fadeUp .15s ease both; }
    .layout-menu-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-3); padding: 2px 4px 6px;
    }
    .layout-menu-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
    }
    .layout-menu-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 6px 4px; border: 1.5px solid transparent;
      border-radius: 6px; background: transparent;
      cursor: pointer; color: var(--text-3);
      font-size: 9px; font-weight: 600; font-family: inherit;
      transition: all .12s;
    }
    .layout-menu-btn:hover { background: var(--bg); border-color: var(--border); color: var(--text-2); }
    .layout-menu-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* Color settings button */
    .btn-color {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-2);
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .12s; flex-shrink: 0;
    }
    .btn-color:hover { background: var(--bg); }

    /* Save / Print buttons */
    .btn-save {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: var(--green); border: none;
      border-radius: 8px; color: #fff;
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .12s; flex-shrink: 0;
    }
    .btn-save:hover { background: #15803d; }
    .btn-print {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-2);
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .12s; flex-shrink: 0;
    }
    .btn-print:hover { background: var(--bg); border-color: #c8bfb5; color: var(--text); }

    /* ══════════════════════════════════
       CONTROL PANEL
    ══════════════════════════════════ */
    .panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .panel-row { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
    .panel-row + .panel-row { padding-top: 18px; border-top: 1px solid var(--border-2); }
    .panel-divider { width: 1px; align-self: stretch; background: var(--border-2); flex-shrink: 0; }
    .section-label {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.4px; color: var(--text-3); margin-bottom: 10px;
    }

    /* ── Piano ── */
    .piano-outer { overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
    .piano-outer::-webkit-scrollbar { height: 3px; }
    .piano-outer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .piano-wrap { position: relative; width: 322px; height: 68px; flex-shrink: 0; user-select: none; }

    .wkey {
      position: absolute; top: 0; width: 44px; height: 68px;
      background: var(--surface); border: 1px solid #d6d0c8; border-top: none;
      border-radius: 0 0 7px 7px; cursor: pointer;
      display: flex; align-items: flex-end; justify-content: center; padding-bottom: 7px;
      font-size: 11px; font-weight: 600; color: var(--text-3); font-family: inherit;
      transition: background .08s, color .08s, transform .06s; z-index: 1;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.05);
    }
    .wkey:hover { background: #faf8f5; color: var(--text-2); }
    .wkey:active { transform: scaleY(.97); transform-origin: top; }
    .wkey.active { background: var(--text); border-color: var(--text); color: #fff; }

    .bkey {
      position: absolute; top: 0; width: 28px; height: 42px;
      background: linear-gradient(180deg, #38322e 0%, #1c1714 100%);
      border: 1px solid #111; border-top: none; border-radius: 0 0 5px 5px;
      cursor: pointer; display: flex; align-items: flex-end;
      justify-content: center; padding-bottom: 5px;
      font-size: 8px; font-weight: 700; color: #7a7068; font-family: inherit;
      transition: background .08s, color .08s, transform .06s; z-index: 2;
      box-shadow: 0 3px 6px rgba(0,0,0,.25);
    }
    .bkey:hover { background: linear-gradient(180deg, #4a433d 0%, #2a2420 100%); color: #9a9088; }
    .bkey:active { transform: scaleY(.97); transform-origin: top; }
    .bkey.active {
      background: linear-gradient(180deg, #d9622b 0%, #a83e12 100%);
      border-color: #8a320e; color: rgba(255,255,255,.85);
    }

    /* ── Scale presets ── */
    .scale-groups { display: flex; flex-direction: column; gap: 7px; }
    .scale-group { display: flex; align-items: center; gap: 8px; }
    .sg-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); width: 48px; flex-shrink: 0; }
    .sg-btns { display: flex; gap: 5px; flex-wrap: wrap; }
    .scale-btn {
      padding: 6px 13px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-2);
      border-radius: 99px; cursor: pointer;
      font-size: 12px; font-weight: 500; font-family: inherit;
      white-space: nowrap; transition: all .18s cubic-bezier(.34,1.56,.64,1);
    }
    .scale-btn:hover { background: var(--bg); border-color: #bfb8ae; color: var(--text); }
    .scale-btn.active {
      background: var(--accent); border-color: var(--accent); color: #fff;
      font-weight: 600; box-shadow: 0 2px 6px rgba(192,81,31,.3);
    }

    /* ── Degree toggles ── */
    .deg-btns { display: flex; flex-wrap: wrap; gap: 5px; }
    .deg-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 10px;
      border: 1.5px solid var(--border); background: var(--surface-2);
      color: var(--text-3); border-radius: 8px; cursor: pointer;
      font-size: 11.5px; font-weight: 700;
      font-family: 'Courier New', 'SF Mono', monospace;
      transition: all .1s; white-space: nowrap;
    }
    .deg-btn:hover:not(.root) { border-color: #bfb8ae; color: var(--text-2); background: var(--surface); }
    .deg-btn.root { cursor: default; }
    .deg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: #ddd7cf; border: 1.5px solid #c8c0b6; }

    /* ── Mask ── */
    .mask-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-mask {
      padding: 8px 18px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text-2);
      border-radius: 8px; cursor: pointer; font-size: 12px;
      font-weight: 700; font-family: inherit; min-height: 44px; transition: all .12s;
    }
    .btn-mask:hover { border-color: #bfb8ae; }
    .btn-mask.on { background: var(--purple); border-color: var(--purple); color: #fff; }
    .mask-sliders { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .mslider-group { display: flex; align-items: center; gap: 7px; }
    .mslider-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-3); width: 22px; }
    input[type=range].mslider {
      -webkit-appearance: none; appearance: none;
      width: 96px; height: 4px; background: var(--border); border-radius: 99px; outline: none; cursor: pointer;
    }
    input[type=range].mslider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: var(--purple); border: 2px solid #fff; box-shadow: 0 0 0 1px var(--purple); cursor: pointer;
    }
    input[type=range].mslider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--purple); border: 2px solid #fff; cursor: pointer;
    }
    .mval { width: 20px; text-align: center; font-family: 'Courier New', monospace; font-weight: 700; font-size: 13px; color: var(--purple); }
    .msep { color: var(--border); font-size: 16px; margin: 0 1px; }

    /* ══════════════════════════════════
       TAB LAYOUT
    ══════════════════════════════════ */
    .tabs { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .tab-nav {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--border);
      background: var(--surface); padding: 0 16px; flex-shrink: 0;
    }
    .tab-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px; height: 40px; border: none; background: transparent;
      font-size: 13px; font-weight: 600; font-family: inherit;
      color: var(--text-3); cursor: pointer;
      border-bottom: 2.5px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn:hover { color: var(--text-2); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-badge {
      background: var(--accent); color: #fff;
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 99px; line-height: 1.4;
    }
    .tab-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    .tab-pane.hidden { display: none; }

    /* Edit tab: panel (fixed) + fretboard (fills rest) */
    #tabEdit > .panel { flex-shrink: 0; }
    .edit-fb-area {
      flex: 1; display: flex; flex-direction: column;
      min-height: 0; padding: 10px 20px 10px; gap: 6px;
    }
    .edit-fb-area .fb-wrap {
      flex: 1; min-height: 0; overflow: hidden;
      padding: 10px 14px 6px;
    }
    .edit-fb-area svg.fb { min-width: 0 !important; width: 100%; height: 100%; }

    /* Saved tab: scrollable grid */
    #tabSaved { overflow-y: auto; padding: 20px; }
    #savedGrid { display: grid; grid-template-columns: 1fr; gap: 24px; align-items: start; }
    #savedGrid.screen-grid svg.fb { min-width: 0 !important; }
    #savedGrid.screen-grid .fb-title,
    #savedGrid.screen-grid .saved-title-input { font-size: 15px; }
    #savedGrid.screen-grid .fb-wrap { padding: 10px 10px 6px; }

    .fb-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .fb-title { font-size: 20px; font-weight: 700; letter-spacing: -.6px; color: var(--text); }

    .fb-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 16px 8px;
      box-shadow: var(--shadow-sm); overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .fb-wrap::-webkit-scrollbar { height: 4px; }
    .fb-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    svg.fb { display: block; min-width: 640px; width: 100%; height: auto; }

    /* ── Legend ── */
    .legend { margin-top: 14px; display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .legend-chip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px 4px 6px; border-radius: 99px; border: 1px solid transparent;
      font-size: 11px; font-weight: 700; font-family: 'Courier New', monospace;
    }
    .legend-dot {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 7.5px; font-weight: 700; font-family: 'Courier New', monospace; flex-shrink: 0;
    }

    /* ══════════════════════════════════
       SAVED SCALES (screen)
    ══════════════════════════════════ */
    .saved-divider {
      display: flex; align-items: center; gap: 12px; margin: 4px 0 28px;
    }
    .saved-divider-line { flex: 1; height: 1px; background: var(--border-2); }
    .saved-divider-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-3); white-space: nowrap; }

    .saved-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .saved-title-input {
      font-size: 20px; font-weight: 700; letter-spacing: -.5px;
      color: var(--text); background: transparent; border: none; outline: none;
      border-bottom: 2px solid transparent; padding: 2px 0;
      font-family: inherit; transition: border-color .15s; flex: 1; min-width: 0;
    }
    .saved-title-input:hover { border-bottom-color: var(--border); }
    .saved-title-input:focus { border-bottom-color: var(--accent); }

    .btn-delete {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-3);
      border-radius: 6px; cursor: pointer; font-size: 11px;
      font-weight: 600; font-family: inherit; transition: all .12s; flex-shrink: 0;
    }
    .btn-delete:hover { background: #fff1f0; border-color: #fca5a5; color: #dc2626; }

    /* ══════════════════════════════════
       SAVE MODAL
    ══════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
      opacity: 0; pointer-events: none; transition: opacity .18s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--surface); border-radius: 14px;
      padding: 28px 28px 24px; width: 100%; max-width: 400px;
      box-shadow: var(--shadow-md);
      transform: translateY(8px); transition: transform .18s;
    }
    .modal-overlay.show .modal-box { transform: translateY(0); }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
    .modal-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-3); margin-bottom: 7px; }
    .modal-input {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 14px; font-weight: 500; font-family: inherit;
      color: var(--text); background: var(--surface-2); outline: none; transition: border-color .12s;
    }
    .modal-input:focus { border-color: var(--green); background: #fff; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .modal-cancel {
      padding: 9px 18px; border: 1px solid var(--border); background: var(--surface);
      color: var(--text-2); border-radius: 8px; cursor: pointer; font-size: 13px;
      font-weight: 600; font-family: inherit; transition: all .12s;
    }
    .modal-cancel:hover { background: var(--bg); }
    .modal-confirm {
      padding: 9px 20px; border: none; background: var(--green); color: #fff;
      border-radius: 8px; cursor: pointer; font-size: 13px;
      font-weight: 700; font-family: inherit;
    }
    .modal-confirm:hover { background: #15803d; }

    /* ══════════════════════════════════
       COLOR MODAL
    ══════════════════════════════════ */
    .color-modal-box {
      background: var(--surface); border-radius: 14px;
      padding: 24px 24px 20px; width: 100%; max-width: 500px;
      box-shadow: var(--shadow-md);
      transform: translateY(8px); transition: transform .18s;
      max-height: 85vh; overflow-y: auto;
    }
    .modal-overlay.show .color-modal-box { transform: translateY(0); }
    .color-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .color-row {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border: 1px solid var(--border-2);
      border-radius: 8px; background: var(--surface-2);
    }
    .color-row-badge {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid; flex-shrink: 0;
    }
    .color-row-name {
      font-family: 'Courier New', monospace; font-weight: 700;
      font-size: 12px; width: 28px; flex-shrink: 0; color: var(--text);
    }
    .color-mode-btns { display: flex; gap: 3px; flex-shrink: 0; }
    .color-mode-btn {
      padding: 3px 8px; border: 1.5px solid var(--border);
      border-radius: 5px; background: var(--surface); color: var(--text-3);
      font-size: 10px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: all .1s;
    }
    .color-mode-btn.active { background: var(--text); border-color: var(--text); color: #fff; }
    .color-swatch-group { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .color-swatch-pair { display: flex; align-items: center; gap: 4px; }
    .color-swatch-label { font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .5px; }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid var(--border); cursor: pointer;
      overflow: hidden; flex-shrink: 0; display: block;
    }
    .color-swatch input[type=color] {
      width: 200%; height: 200%; margin: -50%; border: none; cursor: pointer; padding: 0;
    }
    .btn-reset-colors {
      padding: 7px 14px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-2);
      border-radius: 7px; cursor: pointer; font-size: 12px;
      font-weight: 600; font-family: inherit; transition: all .12s;
    }
    .btn-reset-colors:hover { background: var(--bg); }

    /* ══════════════════════════════════
       PRINT BASE
    ══════════════════════════════════ */
    @media print {
      body { background: #fff; height: auto; overflow: auto; }
      .header, .modal-overlay, .saved-divider, .btn-delete, .legend, .tab-nav { display: none !important; }
      #tabEdit { display: none !important; }
      .tabs { display: block !important; overflow: visible !important; height: auto !important; }
      #tabSaved { display: block !important; overflow: visible !important; padding: 0 !important; }
      .saved-title-input { border-bottom: none !important; }
      svg.fb { min-width: 0 !important; }
    }

    /* ══════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════ */
    @keyframes dotPop {
      0%   { transform: scale(0);    opacity: 0; }
      60%  { transform: scale(1.22); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes iconBounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(.78); }
      65%  { transform: scale(1.18); }
      85%  { transform: scale(.95); }
      100% { transform: scale(1); }
    }
    @keyframes fadeUp {
      from { transform: translateY(14px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to   { transform: translateY(0); }
    }
    @keyframes badgePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(192,81,31,.0); }
      50%     { box-shadow: 0 0 0 5px rgba(192,81,31,.18); }
    }

    .header { animation: slideDown .32s cubic-bezier(.22,1,.36,1) both; }
    .panel  { animation: fadeUp .38s .08s ease both; }
    .fb-block { animation: fadeUp .42s .16s ease both; }
    .saved-card { animation: fadeUp .3s ease both; }
    .brand-badge { animation: badgePulse 2.4s 1s ease-in-out infinite; }

    /* SVG note dot spring animation */
    .fb-dot {
      transform-box: fill-box;
      transform-origin: center;
      animation: dotPop .3s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes dotExit {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0);   opacity: 0; }
    }
    .fb-dot-exit {
      transform-box: fill-box;
      transform-origin: center;
      animation: dotExit .18s ease-in forwards !important;
    }

    /* Layout icon bounce on select */
    .layout-icon-btn.bounce {
      animation: iconBounce .35s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Scale / degree button press feedback */
    .scale-btn:active { transform: scale(.93); }
    .deg-btn:active   { transform: scale(.92); }
    .hdr-btn:active   { transform: scale(.9); }
    .btn-save:active  { transform: scale(.95); }
    .btn-print:active { transform: scale(.95); }

    /* ══════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════ */
    @media (max-width: 600px) {
      .panel { padding: 14px; gap: 14px; }
      .panel-row { gap: 14px; }
      .panel-divider { display: none; }
      main { padding: 16px 14px 28px; }
      .fb-wrap { padding: 12px 10px 6px; }
      .fb-title { font-size: 18px; }
      .saved-title-input { font-size: 17px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand">
    <span class="brand-badge">SG</span>
    <span class="brand-name">スケールジェネレータ</span>
  </div>
  <div class="header-spacer"></div>

  <!-- Grid layout dropdown picker -->
  <div class="layout-picker" id="layoutPicker">
    <button class="layout-trigger" id="layoutTrigger" onclick="toggleLayoutMenu()">
      <span class="layout-trigger-icon" id="layoutTriggerIcon"></span>
      <span class="layout-trigger-label" id="layoutTriggerLabel">2×3</span>
      <svg class="layout-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="2,3.5 5,6.5 8,3.5"/></svg>
    </button>
    <div class="layout-menu" id="layoutMenu">
      <div class="layout-menu-label">印刷レイアウト</div>
      <div class="layout-menu-grid" id="layoutMenuGrid"></div>
    </div>
  </div>

  <!-- Orientation toggle -->
  <div class="hdr-group">
    <button class="hdr-btn" id="orientLand" onclick="setOrientation('landscape')">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><rect x=".75" y="2.25" width="9.5" height="6.5" rx="1"/></svg>横
    </button>
    <button class="hdr-btn" id="orientPort" onclick="setOrientation('portrait')">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.25" y=".75" width="6.5" height="9.5" rx="1"/></svg>縦
    </button>
  </div>

  <button class="btn-color" onclick="openColorModal()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 0 18 2.5 2.5 0 0 0 0-5 .5.5 0 0 1 0-1h.01A9 9 0 0 0 12 3zM3 12a9 9 0 0 1 9-9 9 9 0 1 1-9 9zm5-1a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3-3a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm4 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm3 3a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/></svg>
    色
  </button>

  <button class="btn-save" onclick="openSaveModal()">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4.5L10.5 0H2zM10 1.5V5h3.5L10 1.5zM3 7h10v1H3V7zm0 3h10v1H3v-1zm0 3h6v1H3v-1z"/></svg>
    保存
  </button>

  <button class="btn-print" onclick="window.print()">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5 1a1 1 0 0 0-1 1v1H3a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h1v1a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1h1a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-1V2a1 1 0 0 0-1-1H5zm0 2h6v1H5V3zm6 8H5v-2h6v2z"/></svg>
    Print A4
  </button>
</header>

<!-- TABS -->
<div class="tabs">
  <nav class="tab-nav">
    <button class="tab-btn active" id="tabBtnEdit" onclick="switchTab('edit')">編集</button>
    <button class="tab-btn" id="tabBtnSaved" onclick="switchTab('saved')">
      保存済み<span class="tab-badge" id="savedBadge" style="display:none">0</span>
    </button>
  </nav>

  <!-- Edit pane: panel (controls) + fretboard -->
  <div class="tab-pane" id="tabEdit">
    <div class="panel">
      <div class="panel-row">
        <section>
          <div class="section-label">Key</div>
          <div class="piano-outer"><div class="piano-wrap" id="piano"></div></div>
        </section>
        <div class="panel-divider"></div>
        <section>
          <div class="section-label">Scale</div>
          <div class="scale-groups" id="scaleGroups"></div>
        </section>
      </div>
      <div class="panel-row">
        <section>
          <div class="section-label">Degrees</div>
          <div class="deg-btns" id="degBtns"></div>
        </section>
        <div class="panel-divider"></div>
        <section>
          <div class="section-label">Fret Mask</div>
          <div class="mask-row">
            <button class="btn-mask" id="maskToggle" onclick="toggleMask()">Mask OFF</button>
            <div class="mask-sliders" id="maskSliders" style="display:none">
              <div class="mslider-group">
                <span class="mslider-lbl">Min</span>

              <div class="mslider-group">
                <span class="mslider-lbl">Max</span>

                <span class="mval" id="mMaxVal">15</span>
              </div>

    </div>
    <div class="edit-fb-area">
      <div class="fb-header">
        <div class="fb-title" id="fbTitle"></div>
      </div>
      <div class="fb-wrap">
        <svg class="fb" id="fretboard" viewBox="0 0 960 230" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="legend" id="legend"></div>
    </div>
  </div>

  <!-- Saved pane: printed grid -->
  <div class="tab-pane hidden" id="tabSaved">
    <div id="savedGrid"></div>
  </div>
</div>

<!-- COLOR MODAL -->
<div class="modal-overlay" id="colorModal" onclick="onColorOverlayClick(event)">
  <div class="color-modal-box">
    <div class="modal-title">度数カラー設定</div>

    <div class="modal-actions">
      <button class="btn-reset-colors" onclick="resetColors()">デフォルトに戻す</button>
      <button class="modal-confirm" onclick="closeColorModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- SAVE MODAL -->
<div class="modal-overlay" id="saveModal" onclick="onModalOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-title">スケールを保存</div>
    <div class="modal-label">タイトル</div>
    <input class="modal-input" id="modalInput" type="text"
      onkeydown="if(event.key==='Enter') confirmSave()">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeSaveModal()">キャンセル</button>
      <button class="modal-confirm" onclick="confirmSave()">保存する</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// Data
// ═══════════════════════════════════════════
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const DEGREES = [
  { name:'R',   semi:0,  col:{ fill:'#fde8e8', stroke:'#c0392b', text:'#c0392b' } },
  { name:'b9',  semi:1,  col:{ fill:'#f3e8fd', stroke:'#7c3aed', text:'#7c3aed' } },
  { name:'9',   semi:2,  col:{ fill:'#dbeafe', stroke:'#2563eb', text:'#1d4ed8' } },
  { name:'m3',  semi:3,  col:{ fill:'#ede9fe', stroke:'#6d28d9', text:'#5b21b6' } },
  { name:'M3',  semi:4,  col:{ fill:'#dcfce7', stroke:'#16a34a', text:'#15803d' } },
  { name:'11',  semi:5,  col:{ fill:'#cffafe', stroke:'#0891b2', text:'#0e7490' } },
  { name:'#11', semi:6,  col:{ fill:'#fff7ed', stroke:'#ea580c', text:'#c2410c' } },
  { name:'P5',  semi:7,  col:{ fill:'#d1fae5', stroke:'#059669', text:'#047857' } },
  { name:'b13', semi:8,  col:{ fill:'#fce7f3', stroke:'#db2777', text:'#be185d' } },
  { name:'13',  semi:9,  col:{ fill:'#d1fae5', stroke:'#0d9488', text:'#0f766e' } },
  { name:'m7',  semi:10, col:{ fill:'#f1f5f9', stroke:'#64748b', text:'#475569' } },
  { name:'M7',  semi:11, col:{ fill:'#fff8f0', stroke:'#b54a1f', text:'#9a3d18' } },
];

const PRESET_GROUPS = [
  { label:'Penta', presets:[
    { name:'Major Penta', degrees:[0,2,4,7,9]    },
    { name:'Minor Penta', degrees:[0,3,5,7,10]   },
    { name:'Blues',       degrees:[0,3,5,6,7,10] },
  ]},
  { label:'Diatonic', presets:[
    { name:'Major',         degrees:[0,2,4,5,7,9,11] },
    { name:'Natural Minor', degrees:[0,2,3,5,7,8,10] },
    { name:'Dorian',        degrees:[0,2,3,5,7,9,10] },
    { name:'Mixolydian',    degrees:[0,2,4,5,7,9,10] },
  ]},
  { label:'Advanced', presets:[
    { name:'Lydian Dom',   degrees:[0,2,4,6,7,9,10] },
    { name:'Altered',      degrees:[0,1,3,4,6,8,10] },
    { name:'Harmonic Min', degrees:[0,2,3,5,7,8,11] },
  ]},
];

const WHITE_KEYS = [
  {note:'C',idx:0},{note:'D',idx:2},{note:'E',idx:4},
  {note:'F',idx:5},{note:'G',idx:7},{note:'A',idx:9},{note:'B',idx:11},
];
const BLACK_KEYS = [
  {note:'C#',idx:1,wi:0},{note:'D#',idx:3,wi:1},
  {note:'F#',idx:6,wi:3},{note:'G#',idx:8,wi:4},{note:'A#',idx:10,wi:5},
];
const WW=46, BW=28, BH=42;

const TUNING = [64,59,55,50,45,40];
const STR_LABELS = ['E4','B3','G3','D3','A2','E2'];

const SVG_W=960, SVG_H=230;
const ML=50, MT=20, MR=10, MB=42;
const F0=1, F1=15;
const FBW=SVG_W-ML-MR, FBH=SVG_H-MT-MB;
const FW=FBW/(F1-F0+1);
const SH=FBH/5;
const CR=12.5;

// ═══════════════════════════════════════════
// Degree colors (user-configurable)
// ═══════════════════════════════════════════
// { solid: bool, color: accent/border hex, text: text hex }
const DEFAULT_COLORS = [
  { solid: true,  color: '#d92b2b', text: '#ffffff' }, // R   – red fill, white text
  { solid: false, color: '#1c1c1c', text: '#1c1c1c' }, // b9  – white/black
  { solid: false, color: '#1c1c1c', text: '#1c1c1c' }, // 9   – white/black
  { solid: false, color: '#d92b2b', text: '#d92b2b' }, // m3  – white/red
  { solid: false, color: '#d92b2b', text: '#d92b2b' }, // M3  – white/red
  { solid: false, color: '#1c1c1c', text: '#1c1c1c' }, // 11  – white/black
  { solid: false, color: '#1c1c1c', text: '#1c1c1c' }, // #11 – white/black
  { solid: false, color: '#d92b2b', text: '#d92b2b' }, // P5  – white/red
  { solid: false, color: '#1c1c1c', text: '#1c1c1c' }, // b13 – white/black
  { solid: false, color: '#1c1c1c', text: '#1c1c1c' }, // 13  – white/black
  { solid: false, color: '#d92b2b', text: '#d92b2b' }, // m7  – white/red
  { solid: false, color: '#d92b2b', text: '#d92b2b' }, // M7  – white/red
];
let degreeColors = DEFAULT_COLORS.map(c => ({...c}));

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
let rootIdx    = 9;
let active     = new Set([0,3,5,7,10]);
let presetName = 'Minor Penta';
let maskOn     = false;
let maskLo     = F0;
let maskHi     = F1;
let orientation = 'landscape';
let printCols  = 2;
let printRows  = 3;
let savedScales = [];
let nextId = 1;

// ═══════════════════════════════════════════
// SVG helpers
// ═══════════════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';
function se(tag, attrs, txt) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (txt !== undefined) e.textContent = txt;
  return e;
}
const fx = f => ML + (f-F0)*FW + FW/2;
const sy = s => MT + s*SH;

// ═══════════════════════════════════════════
// Fretboard draw
// ═══════════════════════════════════════════
function drawFretboard(svgEl, state) {
  const { rootIdx: ri, active: act, maskOn: mon, maskLo: mlo, maskHi: mhi } = state;
  const uid = svgEl.id || ('fb' + Math.random().toString(36).slice(2));
  svgEl.innerHTML = '';

  svgEl.appendChild(se('rect',{x:0,y:0,width:SVG_W,height:SVG_H,fill:'#fff'}));

  const defs = se('defs',{});
  const grad = se('linearGradient',{id:'g'+uid,x1:'0',y1:'0',x2:'0',y2:'1'});
  grad.appendChild(se('stop',{offset:'0%','stop-color':'#fef6e7'}));
  grad.appendChild(se('stop',{offset:'100%','stop-color':'#f8ead0'}));
  defs.appendChild(grad);
  svgEl.appendChild(defs);

  svgEl.appendChild(se('rect',{x:ML,y:MT,width:FBW,height:FBH,fill:`url(#g${uid})`,stroke:'#cca86a','stroke-width':'1.5',rx:'4'}));

  [3,5,7,9].forEach(f => svgEl.appendChild(se('circle',{cx:fx(f),cy:MT+FBH/2,r:4.5,fill:'rgba(180,140,80,.22)'})));
  [MT+FBH/3, MT+FBH*2/3].forEach(cy => svgEl.appendChild(se('circle',{cx:fx(12),cy,r:4.5,fill:'rgba(180,140,80,.22)'})));

  svgEl.appendChild(se('rect',{x:ML-5,y:MT,width:6,height:FBH,fill:'#d8c8a0',rx:'1.5'}));
  svgEl.appendChild(se('rect',{x:ML-5,y:MT,width:3,height:FBH,fill:'rgba(255,255,255,.35)',rx:'1.5'}));

  for (let f=F0; f<=F1+1; f++) {
    const x=ML+(f-F0)*FW, is12=f===12;
    svgEl.appendChild(se('line',{x1:x,y1:MT+1,x2:x,y2:MT+FBH-1,stroke:is12?'#8a6635':'#c8a45a','stroke-width':is12?2.5:1.2,opacity:is12?1:.8}));
  }
  [3,5,7,9,12,15].forEach(f => {
    if (f<F0||f>F1) return;
    svgEl.appendChild(se('text',{x:fx(f),y:MT+FBH+15,'text-anchor':'middle',fill:'#bbb','font-size':'10','font-family':'monospace','font-weight':'600'},String(f)));
  });
  [3,5,7,9].forEach(f => {
    if(f<F0||f>F1) return;
    svgEl.appendChild(se('circle',{cx:fx(f),cy:MT+FBH+26,r:3.5,fill:'#d0cbc3'}));
  });
  [-7,7].forEach(dx => svgEl.appendChild(se('circle',{cx:fx(12)+dx,cy:MT+FBH+26,r:3.5,fill:'#d0cbc3'})));

  const sc=['#b8b2a8','#b0aaa0','#a8a298','#a09890','#988f85','#90877c'];
  for (let s=0;s<6;s++) {
    const y=sy(s);
    svgEl.appendChild(se('line',{x1:ML,y1:y,x2:ML+FBW,y2:y,stroke:sc[s],'stroke-width':(0.8+s*0.42).toFixed(2)}));
    svgEl.appendChild(se('text',{x:ML-7,y:y+4,'text-anchor':'end',fill:'#c5bfb5','font-size':'9','font-family':'monospace'},STR_LABELS[s]));
  }

  for (let s=0;s<6;s++) {
    for (let f=F0;f<=F1;f++) {
      const midi=TUNING[s]+f, deg=((midi%12)-ri+12)%12;
      if (!act.has(deg)) continue;
      const cx=fx(f), cy=sy(s);
      const { name } = DEGREES[deg], isRoot = deg === 0;
      const dc = (state.colors || degreeColors)[deg];
      const dotFill = dc.solid ? dc.color : '#ffffff';
      const delay=`${(f-F0)*22}ms`;
      svgEl.appendChild(se('circle',{cx:cx+.5,cy:cy+1.5,r:CR,fill:'rgba(0,0,0,.10)',class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`}));
      svgEl.appendChild(se('circle',{cx,cy,r:CR,fill:dotFill,stroke:dc.color,'stroke-width':isRoot?2.5:1.8,class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`}));
      if (isRoot) svgEl.appendChild(se('circle',{cx,cy,r:CR-3.5,fill:'none',stroke:dc.color,'stroke-width':'1',opacity:'.45',class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`}));
      const fs=name.length>=4?'8.5':name.length===1?'15':'12';
      svgEl.appendChild(se('text',{x:cx,y:cy+4.5,'text-anchor':'middle',fill:dc.text,'font-size':fs,'font-weight':'bold','font-family':"'Courier New',monospace",class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`},name));
    }
  }

  if (mon) {
    const mf='rgba(215,210,205,.75)';
    if (mlo>F0){const x1=ML,x2=ML+(mlo-F0)*FW;svgEl.appendChild(se('rect',{x:x1,y:MT,width:x2-x1,height:FBH,fill:mf,rx:'3'}));}
    if (mhi<F1){const x1=ML+(mhi-F0+1)*FW,x2=ML+FBW;svgEl.appendChild(se('rect',{x:x1,y:MT,width:x2-x1,height:FBH,fill:mf,rx:'3'}));}
    const rx=ML+(mlo-F0)*FW,rw=(mhi-mlo+1)*FW;
    svgEl.appendChild(se('rect',{x:rx,y:MT-2,width:rw,height:FBH+4,fill:'none',stroke:'#7c3aed','stroke-width':'2',rx:'4',opacity:'.9'}));
  }
}

function renderFretboard() {
  drawFretboard(document.getElementById('fretboard'), {rootIdx, active, maskOn, maskLo, maskHi});
}

// Append dots for a single degree onto an existing fretboard SVG (no full redraw)
function appendDegDots(svgEl, state, deg) {
  const { rootIdx: ri, maskOn: mon, maskLo: mlo, maskHi: mhi } = state;
  const dc = (state.colors || degreeColors)[deg];
  const { name } = DEGREES[deg];
  const isRoot = deg === 0;
  const dotFill = dc.solid ? dc.color : '#ffffff';
  const fs = name.length >= 4 ? '8.5' : name.length === 1 ? '15' : '12';
  for (let s = 0; s < 6; s++) {
    for (let f = F0; f <= F1; f++) {
      const d = ((TUNING[s] + f) % 12 - ri + 12) % 12;
      if (d !== deg) continue;
      if (mon && (f < mlo || f > mhi)) continue;
      const cx = fx(f), cy = sy(s);
      const delay = `${(f - F0) * 22}ms`;
      svgEl.appendChild(se('circle',{cx:cx+.5,cy:cy+1.5,r:CR,fill:'rgba(0,0,0,.10)',class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`}));
      svgEl.appendChild(se('circle',{cx,cy,r:CR,fill:dotFill,stroke:dc.color,'stroke-width':isRoot?2.5:1.8,class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`}));
      if (isRoot) svgEl.appendChild(se('circle',{cx,cy,r:CR-3.5,fill:'none',stroke:dc.color,'stroke-width':'1',opacity:'.45',class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`}));
      svgEl.appendChild(se('text',{x:cx,y:cy+4.5,'text-anchor':'middle',fill:dc.text,'font-size':fs,'font-weight':'bold','font-family':"'Courier New',monospace",class:'fb-dot','data-deg':deg,style:`animation-delay:${delay}`},name));
    }
  }
}

// ═══════════════════════════════════════════
// Legend
// ═══════════════════════════════════════════
function buildLegend(container, state) {
  container.innerHTML = '';
  [...state.active].sort((a,b)=>a-b).forEach(i => {
    const {col,name}=DEGREES[i];
    const chip=document.createElement('div');
    chip.className='legend-chip';
    chip.style.cssText=`background:${col.fill};border-color:${col.stroke}55;color:${col.text}`;
    const dot=document.createElement('div');
    dot.className='legend-dot';
    dot.style.cssText=`background:${col.fill};border:1.5px solid ${col.stroke};color:${col.text}`;
    dot.textContent=name.length<=2?name:'';
    chip.appendChild(dot);
    chip.appendChild(document.createTextNode(i===0?`R — ${NOTES[state.rootIdx]}`:name));
    container.appendChild(chip);
  });
}

function renderLegend() {
  buildLegend(document.getElementById('legend'), {rootIdx, active});
}

function currentTitle() {
  const key=NOTES[rootIdx];
  return presetName
    ? `${key} ${presetName}`
    : `${key} — Custom (${[...active].sort((a,b)=>a-b).map(i=>DEGREES[i].name).join(', ')})`;
}

function renderTitle() {
  document.getElementById('fbTitle').textContent = currentTitle();
}

function refresh() { renderTitle(); renderFretboard(); renderLegend(); }

// ═══════════════════════════════════════════
// Orientation & Layout
// ═══════════════════════════════════════════
function setOrientation(orient) {
  orientation = orient;
  document.getElementById('print-orient').textContent =
    `@media print { @page { size: A4 ${orient}; margin: 10mm 12mm; } }`;
  document.getElementById('orientLand').classList.toggle('active', orient==='landscape');
  document.getElementById('orientPort').classList.toggle('active', orient==='portrait');
  updatePrintLayout();
}

// Layout presets: [cols, rows]
const LAYOUT_PRESETS = [[1,1],[1,2],[2,1],[2,2],[2,3],[2,4],[3,3],[3,4],[3,5]];

function makeGridSVG(cols, rows, size) {
  const W = size, H = Math.round(size * 0.77);
  const pad = 1.5, gap = 1;
  const cw = (W - pad*2 - gap*(cols-1)) / cols;
  const ch = (H - pad*2 - gap*(rows-1)) / rows;
  let rects = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = (pad + c*(cw+gap)).toFixed(1);
      const y = (pad + r*(ch+gap)).toFixed(1);
      rects += `<rect x="${x}" y="${y}" width="${(+cw).toFixed(1)}" height="${(+ch).toFixed(1)}" rx="0.5"/>`;
    }
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" fill="currentColor">${rects}</svg>`;
}

function buildLayoutMenu() {
  const grid = document.getElementById('layoutMenuGrid');
  LAYOUT_PRESETS.forEach(([cols, rows]) => {
    const btn = document.createElement('button');
    btn.className = 'layout-menu-btn' + (cols===printCols && rows===printRows ? ' active' : '');
    btn.dataset.cols = cols; btn.dataset.rows = rows;
    btn.title = `${cols}列 × ${rows}行`;
    btn.innerHTML = makeGridSVG(cols, rows, 28) + `<span>${cols}×${rows}</span>`;
    btn.onclick = () => pickLayout(cols, rows);
    grid.appendChild(btn);
  });
  updateLayoutTrigger();
}

function updateLayoutTrigger() {
  document.getElementById('layoutTriggerIcon').innerHTML = makeGridSVG(printCols, printRows, 18);
  document.getElementById('layoutTriggerLabel').textContent = `${printCols}×${printRows}`;
}

function toggleLayoutMenu() {
  const trigger = document.getElementById('layoutTrigger');
  const menu = document.getElementById('layoutMenu');
  const isOpen = menu.classList.toggle('open');
  trigger.classList.toggle('open', isOpen);
  if (isOpen) {
    setTimeout(() => document.addEventListener('click', closeLayoutMenu, { once: true }), 0);
  }
}

function closeLayoutMenu() {
  document.getElementById('layoutTrigger').classList.remove('open');
  document.getElementById('layoutMenu').classList.remove('open');
}

function updateScreenLayout() {
  const grid = document.getElementById('savedGrid');
  if (printCols > 1) {
    grid.classList.add('screen-grid');
    grid.style.gridTemplateColumns = `repeat(${printCols}, 1fr)`;
    grid.style.gap = '16px';
  } else {
    grid.classList.remove('screen-grid');
    grid.style.gridTemplateColumns = '1fr';
    grid.style.gap = '24px';
  }
}

function pickLayout(cols, rows) {
  printCols = cols; printRows = rows;
  document.querySelectorAll('.layout-menu-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.cols)===cols && parseInt(b.dataset.rows)===rows);
  });
  updateLayoutTrigger();
  closeLayoutMenu();
  updateScreenLayout();
  updatePrintLayout();
}

function updatePrintLayout() {
  // A4 usable area (margin: 10mm top/bottom, 12mm left/right)
  // Landscape: 273 × 190mm  |  Portrait: 186 × 277mm
  const isLand = orientation === 'landscape';
  const pageW  = isLand ? 273 : 186;
  const pageH  = isLand ? 190 : 277;

  const gapMm = 3;
  const cellW = (pageW - gapMm * (printCols - 1)) / printCols;
  const cellH = (pageH - gapMm * (printRows - 1)) / printRows;

  // SVG aspect ratio: 960 × 230. Natural height at this cell width.
  // 3mm accounts for fb-wrap left+right padding (1.5mm each).
  const svgNatH = (cellW - 3) * (SVG_H / SVG_W);

  // Font sizes scale with cell height
  const titlePt = Math.max(5.5, Math.min(10, cellH / 9)).toFixed(1);
  const legPt   = Math.max(5,   Math.min(8,  cellH / 11)).toFixed(1);
  const legDot  = Math.max(9,   Math.min(16, cellH / 7)).toFixed(0);

  document.getElementById('print-layout').textContent = `
@media print {
  #savedGrid {
    display: grid;
    grid-template-columns: repeat(${printCols}, 1fr);
    gap: ${gapMm}mm;
    align-items: start;
  }
  .saved-card {
    break-inside: avoid;
    margin: 0 !important;
    padding: 0;
  }
  .fb-header, .saved-card-header { margin-bottom: 1mm; }
  .fb-title, .saved-title-input {
    font-size: ${titlePt}pt !important;
    line-height: 1.2;
  }
  .fb-wrap, .saved-card .fb-wrap {
    padding: 1.5mm 1.5mm 1mm;
    overflow: visible;
    border: 1px solid #ddd !important;
    border-radius: 2px !important;
    box-shadow: none !important;
  }
  svg.fb {
    min-width: 0 !important;
    width: 100% !important;
    height: auto !important;
    display: block !important;
  }
  .legend { margin-top: 1mm; gap: 3px; }
  .legend-chip { font-size: ${legPt}pt !important; padding: 1px 5px 1px 3px !important; }
  .legend-dot { width: ${legDot}px !important; height: ${legDot}px !important; font-size: 5px !important; }
}`;
}

// ═══════════════════════════════════════════
// Save Modal
// ═══════════════════════════════════════════
function openSaveModal() {
  document.getElementById('modalInput').value = currentTitle();
  document.getElementById('saveModal').classList.add('show');
  setTimeout(() => document.getElementById('modalInput').select(), 50);
}
function closeSaveModal() { document.getElementById('saveModal').classList.remove('show'); }
function onModalOverlayClick(e) { if (e.target===document.getElementById('saveModal')) closeSaveModal(); }
function confirmSave() {
  const title = document.getElementById('modalInput').value.trim() || currentTitle();
  closeSaveModal();
  addSaved(title);
}

// ═══════════════════════════════════════════
// Saved Scales
// ═══════════════════════════════════════════
function addSaved(title) {
  const snap = { id: nextId++, title, rootIdx, active: new Set(active), maskOn, maskLo, maskHi, colors: degreeColors.map(c=>({...c})) };
  savedScales.push(snap);
  renderSavedCards();
}

function deleteSaved(id) {
  savedScales = savedScales.filter(s => s.id !== id);
  renderSavedCards();
}

function switchTab(name) {
  document.getElementById('tabEdit').classList.toggle('hidden', name !== 'edit');
  document.getElementById('tabSaved').classList.toggle('hidden', name !== 'saved');
  document.getElementById('tabBtnEdit').classList.toggle('active', name === 'edit');
  document.getElementById('tabBtnSaved').classList.toggle('active', name === 'saved');
}

function updateSavedBadge() {
  const badge = document.getElementById('savedBadge');
  const n = savedScales.length;
  badge.textContent = n;
  badge.style.display = n > 0 ? '' : 'none';
}

function renderSavedCards() {
  document.querySelectorAll('.saved-card').forEach(el => el.remove());
  const grid = document.getElementById('savedGrid');

  savedScales.forEach(snap => {
    const card = document.createElement('div');
    card.className = 'saved-card';
    card.dataset.id = snap.id;

    const hdr = document.createElement('div');
    hdr.className = 'saved-card-header';

    const inp = document.createElement('input');
    inp.type = 'text'; inp.className = 'saved-title-input'; inp.value = snap.title;
    inp.oninput = e => { snap.title = e.target.value; };

    const del = document.createElement('button');
    del.className = 'btn-delete';
    del.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2h3.5V1h3v1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/></svg>削除`;
    del.onclick = () => deleteSaved(snap.id);

    hdr.appendChild(inp); hdr.appendChild(del);
    card.appendChild(hdr);

    const wrap = document.createElement('div');
    wrap.className = 'fb-wrap';
    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('class','fb');
    svg.setAttribute('id', 'sv'+snap.id);
    svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
    svg.setAttribute('preserveAspectRatio','xMidYMid meet');
    wrap.appendChild(svg);
    card.appendChild(wrap);

    const leg = document.createElement('div');
    leg.className = 'legend';
    card.appendChild(leg);

    grid.appendChild(card);
    drawFretboard(svg, snap);
    buildLegend(leg, snap);
  });
  updateSavedBadge();
}

// ═══════════════════════════════════════════
// Piano keyboard
// ═══════════════════════════════════════════
function buildPiano() {
  const wrap = document.getElementById('piano');
  WHITE_KEYS.forEach((k,i) => {
    const btn = document.createElement('button');
    btn.className = 'wkey' + (k.idx===rootIdx?' active':'');
    btn.dataset.ni = k.idx; btn.style.left = `${i*WW}px`; btn.textContent = k.note;
    btn.onclick = () => setRoot(k.idx); wrap.appendChild(btn);
  });
  BLACK_KEYS.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'bkey' + (k.idx===rootIdx?' active':'');
    btn.dataset.ni = k.idx;
    btn.style.left=`${(k.wi+1)*WW-BW/2-1}px`; btn.style.width=`${BW}px`; btn.style.height=`${BH}px`;
    btn.textContent=k.note; btn.onclick=()=>setRoot(k.idx); wrap.appendChild(btn);
  });
}

function setRoot(index) {
  rootIdx = index;
  document.querySelectorAll('.wkey,.bkey').forEach(b => b.classList.toggle('active', parseInt(b.dataset.ni)===index));
  refresh();
}

// ═══════════════════════════════════════════
// Scale presets
// ═══════════════════════════════════════════
function buildScaleGroups() {
  const c = document.getElementById('scaleGroups');
  PRESET_GROUPS.forEach(group => {
    const row=document.createElement('div'); row.className='scale-group';
    const lbl=document.createElement('span'); lbl.className='sg-label'; lbl.textContent=group.label;
    row.appendChild(lbl);
    const btns=document.createElement('div'); btns.className='sg-btns';
    group.presets.forEach(p => {
      const btn=document.createElement('button');
      btn.className='scale-btn'+(p.name===presetName?' active':'');
      btn.dataset.pn=p.name; btn.textContent=p.name;
      btn.onclick=()=>applyPreset(p); btns.appendChild(btn);
    });
    row.appendChild(btns); c.appendChild(row);
  });
}

function applyPreset(p) {
  presetName=p.name; active=new Set(p.degrees);
  document.querySelectorAll('.scale-btn').forEach(b=>b.classList.toggle('active',b.dataset.pn===p.name));
  syncDegBtns(); refresh();
}

// ═══════════════════════════════════════════
// Degree toggles
// ═══════════════════════════════════════════
function buildDegBtns() {
  const c=document.getElementById('degBtns');
  DEGREES.forEach((d,i)=>{
    const btn=document.createElement('button');
    btn.className='deg-btn'+(i===0?' root':''); btn.dataset.di=i;
    const dot=document.createElement('span'); dot.className='deg-dot'; dot.dataset.dd=i;
    btn.appendChild(dot); btn.appendChild(document.createTextNode(d.name));
    if(i!==0) btn.onclick=()=>toggleDeg(i);
    c.appendChild(btn);
  });
}

function syncDegBtns() {
  document.querySelectorAll('.deg-btn').forEach(btn => {
    const i = parseInt(btn.dataset.di);
    const dot = btn.querySelector('.deg-dot');
    if (active.has(i)) {
      const dc = degreeColors[i];
      const bg = dc.solid ? dc.color : '#ffffff';
      btn.style.background = bg;
      btn.style.borderColor = dc.color;
      btn.style.color = dc.text;
      dot.style.background = dc.color;
      dot.style.borderColor = dc.color;
    } else { btn.style.cssText = ''; dot.style.cssText = ''; }
  });
}

function toggleDeg(i) {
  const wasActive = active.has(i);
  if (wasActive) active.delete(i); else active.add(i);
  presetName = null;
  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('active'));
  syncDegBtns();

  const svgEl = document.getElementById('fretboard');
  if (wasActive) {
    // Animate out only the dots for this degree, then remove
    svgEl.querySelectorAll(`[data-deg="${i}"]`).forEach(el => {
      el.style.animationDelay = '0s';
      el.classList.add('fb-dot-exit');
      el.addEventListener('animationend', () => el.remove(), { once: true });
    });
  } else {
    // Append only the new degree's dots with pop-in animation
    appendDegDots(svgEl, { rootIdx, active, maskOn, maskLo, maskHi }, i);
  }
  renderTitle();
  renderLegend();
}

// ═══════════════════════════════════════════
// Mask
// ═══════════════════════════════════════════
function toggleMask() {
  maskOn=!maskOn;
  const btn=document.getElementById('maskToggle');
  btn.textContent=maskOn?'Mask ON':'Mask OFF'; btn.classList.toggle('on',maskOn);
  document.getElementById('maskSliders').style.display=maskOn?'flex':'none';
  refresh();
}

function onMaskInput(e) {
  const minEl=document.getElementById('maskMin'), maxEl=document.getElementById('maskMax');
  let lo=parseInt(minEl.value), hi=parseInt(maxEl.value);
  if(lo>hi){if(e.target===minEl){maxEl.value=lo;hi=lo;}else{minEl.value=hi;lo=hi;}}
  maskLo=lo; maskHi=hi;
  document.getElementById('mMinVal').textContent=lo;
  document.getElementById('mMaxVal').textContent=hi;
  refresh();
}

// ═══════════════════════════════════════════
// Color Modal
// ═══════════════════════════════════════════
function buildColorModal() {
  const list = document.getElementById('colorList');
  list.innerHTML = '';
  DEGREES.forEach((d, i) => {
    const dc = degreeColors[i];
    const row = document.createElement('div');
    row.className = 'color-row';

    // Preview badge
    const badge = document.createElement('div');
    badge.className = 'color-row-badge';
    applyBadgeStyle(badge, dc);

    const name = document.createElement('span');
    name.className = 'color-row-name';
    name.textContent = d.name;

    // Solid / Hollow toggle
    const modeBtns = document.createElement('div');
    modeBtns.className = 'color-mode-btns';
    ['塗', '白'].forEach((label, si) => {
      const btn = document.createElement('button');
      btn.className = 'color-mode-btn' + ((si === 0) === dc.solid ? ' active' : '');
      btn.textContent = label;
      btn.onclick = () => {
        degreeColors[i] = { ...degreeColors[i], solid: si === 0 };
        modeBtns.querySelectorAll('.color-mode-btn').forEach((b, bi) => b.classList.toggle('active', bi === si));
        applyBadgeStyle(badge, degreeColors[i]);
        syncDegBtns();
        renderFretboard();
      };
      modeBtns.appendChild(btn);
    });

    // Color swatches
    const swatchGroup = document.createElement('div');
    swatchGroup.className = 'color-swatch-group';

    [['枠', 'color'], ['文字', 'text']].forEach(([lbl, key]) => {
      const pair = document.createElement('div');
      pair.className = 'color-swatch-pair';
      const lblEl = document.createElement('span');
      lblEl.className = 'color-swatch-label';
      lblEl.textContent = lbl;
      const swatchLabel = document.createElement('label');
      swatchLabel.className = 'color-swatch';
      swatchLabel.style.background = dc[key];
      const input = document.createElement('input');
      input.type = 'color';
      input.value = dc[key];
      input.oninput = e => {
        degreeColors[i] = { ...degreeColors[i], [key]: e.target.value };
        swatchLabel.style.background = e.target.value;
        applyBadgeStyle(badge, degreeColors[i]);
        syncDegBtns();
        renderFretboard();
      };
      swatchLabel.appendChild(input);
      pair.appendChild(lblEl);
      pair.appendChild(swatchLabel);
      swatchGroup.appendChild(pair);
    });

    row.appendChild(badge);
    row.appendChild(name);
    row.appendChild(modeBtns);
    row.appendChild(swatchGroup);
    list.appendChild(row);
  });
}

function applyBadgeStyle(badge, dc) {
  badge.style.background = dc.solid ? dc.color : '#fff';
  badge.style.borderColor = dc.color;
}

function openColorModal() {
  buildColorModal();
  document.getElementById('colorModal').classList.add('show');
}

function closeColorModal() {
  document.getElementById('colorModal').classList.remove('show');
}

function onColorOverlayClick(e) {
  if (e.target === document.getElementById('colorModal')) closeColorModal();
}

function resetColors() {
  degreeColors = DEFAULT_COLORS.map(c => ({ ...c }));
  buildColorModal();
  syncDegBtns();
  renderFretboard();
}

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
setOrientation('landscape');
buildLayoutMenu();
updateScreenLayout();
buildPiano();
buildScaleGroups();
buildDegBtns();
syncDegBtns();
refresh();
</script>
